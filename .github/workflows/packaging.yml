name: packaging

on:
  # This workflow is manually triggered
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu, macos, windows ]
        build_type: [ Debug, Release ]
        arch: [ x86_64, arm64 ]
        exclude:
          - os: ubuntu
            arch: arm64
          - os: windows
            arch: arm64

    runs-on: ${{ matrix.os }}-${{ (matrix.os == 'macos' && (matrix.arch == 'x86_64' && '15-intel')) || 'latest' }}

    env:
      CMAKE_CONFIG_PROJECT: -DPICROSS_BUILD_CLI=ON -DPICROSS_BUILD_APP=ON
      CMAKE_CONFIG_EXTRA: ${{ matrix.os == 'macos' && format('-DCMAKE_OSX_ARCHITECTURES={0}', matrix.arch) || '' }}

    steps:
    - uses: actions/checkout@v4

    - if: matrix.os == 'ubuntu'
      name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwayland-dev libxkbcommon-dev xorg-dev libgl1-mesa-dev

    - name: Configure CMake
      run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ${{ env.CMAKE_CONFIG_PROJECT }} ${{ env.CMAKE_CONFIG_EXTRA }}

    - name: Build
      working-directory: ${{ github.workspace }}/build
      run: cmake --build . --config ${{ matrix.build_type }}

    - if: matrix.arch == 'x86_64'
      name: Version
      working-directory: ${{ github.workspace }}/build
      run: cmake --build . --target picross_cli_version --config ${{ matrix.build_type }}

    # The Windows process
    - if: matrix.os == 'windows'
      name: Sign Windows executables with Artifact Signing
      uses: azure/artifact-signing-action@v1
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://neu.codesigning.azure.net/
        signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
        certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        files-folder: ${{ github.workspace }}\build\bin\${{ matrix.build_type }}
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256
        exclude-environment-credential: false
        exclude-workload-identity-credential: true
        exclude-managed-identity-credential: true
        exclude-shared-token-cache-credential: true
        exclude-visual-studio-credential: true
        exclude-visual-studio-code-credential: true
        exclude-azure-cli-credential: true
        exclude-azure-powershell-credential: true
        exclude-azure-developer-cli-credential: true
        exclude-interactive-browser-credential: true

    # The macOS process
    - if: matrix.os == 'macos'
      name: Code sign the macOS CLI
      uses: lando/code-sign-action@v3
      with:
        file: ${{ github.workspace }}/build/bin/Picross Solver.app/Contents/MacOS/Picross Solver
        certificate-id: ${{ secrets.MACOS_TEAM_ID }}
        certificate-data: ${{ secrets.MACOS_CERTIFICATE_DATA }}
        certificate-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        options: --options runtime

    - name: Install
      working-directory: ${{ github.workspace }}/build
      run: cmake --install . --config ${{ matrix.build_type }} --prefix install

    - if: matrix.os != 'windows'
      name: Tar files
      working-directory: ${{ github.workspace }}/build
      run: tar -cvf package.tar -C install .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: package-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.build_type }}
        path: ${{ github.workspace }}/build/${{ matrix.os == 'windows' && 'install' || 'package.tar' }}
        retention-days: 6
